<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Resource</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-md border max-w-md w-full">
        <h2 class="text-xl font-bold text-gray-800 mb-2">Request Allocation: {{ asset.name }}</h2>
        
        <p class="text-sm text-gray-500 mb-6">Units Available: {{ unreserved_count }} items.</p>
        
        {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                    <div class="p-3 rounded-lg text-sm font-bold 
                        {% if message.tags == 'error' %} bg-red-100 text-red-700 
                        {% elif message.tags == 'success' %} bg-green-100 text-green-700 
                        {% else %} bg-blue-100 text-blue-700 {% endif %}">
                        ⚠️ {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Required Units</label>
                <input type="number" name="quantity" min="1" value="1" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" required>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Start Date</label>
                <input type="date" name="start_date" required class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Return Due Date</label>
                <input type="date" name="end_date" required class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            
            <div class="flex items-center justify-between pt-4">
                <a href="{% url 'dashboard' %}" class="text-sm text-gray-500 hover:underline">Back to Dashboard</a>
                <button type="submit" class="bg-indigo-600 text-white font-semibold text-sm px-5 py-2 rounded-lg hover:bg-indigo-700">Submit Request</button>
            </div>
        </form>
    </div>
</body>
</html>
