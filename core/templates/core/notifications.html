<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notification Center - SmartAsset Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <main class="max-w-3xl mx-auto p-6 lg:p-8 space-y-6">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-xl font-bold tracking-tight text-white">Inbox Alerts & Updates</h1>
            <a href="{% url 'dashboard' %}" class="text-sm font-medium text-indigo-400 hover:text-indigo-300 transition">← Back to Dashboard</a>
        </div>

        <div class="space-y-4">
            {% for notification in notifications %}
                <div class="p-4 rounded-xl border {% if not notification.is_read %}bg-indigo-500/10 border-indigo-500/30 text-indigo-200{% else %}bg-slate-800/40 border-slate-800 text-slate-400{% endif %} flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium">{{ notification.message }}</p>
                        <p class="text-xs text-slate-500 mt-1">{{ notification.created_at|timesince }} ago</p>
                    </div>
                    {% if not notification.is_read %}
                        <span class="h-2 w-2 rounded-full bg-indigo-500 mt-1.5 animate-pulse"></span>
                    {% endif %}
                </div>
            {% empty %}
                <div class="p-8 text-center border border-dashed border-slate-800 rounded-2xl">
                    <p class="text-sm text-slate-500">Your notification stream is currently clean and empty.</p>
                </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
