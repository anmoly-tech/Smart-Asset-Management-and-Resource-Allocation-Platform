<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl max-w-sm w-full shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <div class="h-12 w-12 bg-violet-600 rounded-2xl flex items-center justify-center font-bold text-xl mx-auto shadow-lg shadow-violet-600/30">R</div>
            <h2 class="text-2xl font-bold tracking-tight">Create Account</h2>
            <p class="text-xs text-slate-500">Register a secure node inside the asset ledger pipeline.</p>
        </div>
        <form method="POST" class="space-y-4 text-sm">
            {% csrf_token %}
            {% for field in form %}
                <div class="space-y-1">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}<p class="text-[10px] text-slate-600 leading-tight">{{ field.help_text }}</p>{% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 rounded-xl transition duration-200 mt-4 shadow-lg shadow-violet-600/20">Register Credentials</button>
        </form>
        <p class="text-center text-xs text-slate-500">Already possess active nodes? <a href="{% url 'login' %}" class="text-violet-400 hover:underline font-medium">Sign In Here</a></p>
    </div>
    <style>
        input { width: 100%; background-color: #020617 !important; border: 1px solid #334155 !important; border-radius: 0.75rem !important; padding: 0.65rem 1rem !important; color: #f8fafc !important; outline: none !important; }
        input:focus { border-color: #8b5cf6 !important; }
    </style>
</body>
</html>
